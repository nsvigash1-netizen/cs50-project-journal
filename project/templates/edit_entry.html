{% extends "layout.html" %}

{% block main %}
<h2>Edit Entry</h2>
<form action="/journal/{{ entry.id }}/edit" method="post" class="col-md-6">
    <div class="mb-3">
        <label class="form-label">Date</label>
        <input class="form-control" name="entry_date" type="date" value="{{ entry.entry_date }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Mood</label>
        <select class="form-select" name="mood">
            {% for value, label in moods.items() %}
            <option value="{{ value }}" {% if entry.mood==value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Content</label>
        <textarea class="form-control" name="content" rows="6">{{ entry.content }}</textarea>
    </div>
    <button class="btn btn-primary" type="submit">Save Changes</button>
</form>
{% endblock %}
