{% extends "layout.html" %}

{% block main %}
<h2>New Entry</h2>
<form action="/journal/new" method="post" class="col-md-6">
    <div class="mb-3">
        <label class="form-label">Date</label>
        <input class="form-control" name="entry_date" type="date" value="{{ today }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Mood</label>
        <select class="form-select" name="mood">
            <option value="" disabled selected>Select mood</option>
            {% for value, label in moods.items() %}
            <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">What's on your mind?</label>
        <textarea class="form-control" name="content" rows="6"></textarea>
    </div>
    <button class="btn btn-primary" type="submit">Save</button>
</form>
{% endblock %}
